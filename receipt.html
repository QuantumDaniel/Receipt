<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Faster+One&family=Imperial+Script&family=Lobster&family=Rubik+Distressed&display=swap"
        rel="stylesheet">
    <title>Document</title>
    <link rel="stylesheet" href="receipt.css">

</head>

<body>

    <div class="container mt-5 h-100 ">
        <div class="row text-center">
            <div><span class="logo"><i class="bi bi-globe" style="color:white"></i></span></div>
            <span> <strong>QUANTUM STORE</strong> </span>
            <div class="tagline">
                <span>Quality You can trust </span>

            </div>

        </div>
        <div class="heading">
            <div class=""><i class="bi bi-calendar-date" style="color:red"> </i></i> Date</div>
            <div id="date"></div>
        </div>
        <div class="heading">
            <div class=""><i class="bi bi-clock-fill" style="color:red"></i> Time</div>
            <div id="time"></div>
        </div>
        <div class="heading">
            <div class=""><i class="bi bi-receipt" style="color:red"></i> Receipt ID</div>
            <div id="id"> </div>
        </div>
        <hr>

        <table class="table">
            <thead>
                <tr>
                    <th>ITEM</th>
                    <th>QTY</th>
                    <th>PRICE</th>
                    <th>TOTAL</th>
                </tr>

            </thead>
            <tbody id="data">


            </tbody>
        </table>
        <hr>
        <div class="summary">
            <div class=""> Subtotal</div>
            <div id="sub-total"> </div>
        </div>
        <div class="summary" style="color:red">
            <div class="">Discount (5%)</div>
            <div id="discount"> </div>
        </div>
        <div class="summary">
            <div class="">VAT (7.5%)</div>
            <div id="tax"> </div>
        </div>
        <hr class="dotted">
        <div class="total">
            <div><strong>TOTAL</strong></div>
            <div> <strong id="total"></strong></div>
        </div>
        <hr>
        <div class="appreciation lobster-regular">Thank you for shopping with us!</div>
        <div class="row text-center footer ">
            <div class="col"><i class="bi bi-telephone-fill" style="color:red"></i>+2349042898107</div>
            <span class="col" style="color:red">|</span>
            <div class="col-4"><i class="bi bi-geo-alt-fill" style="color:red"></i>123 Store Avenue, Lagos, Nigeria
            </div>
            <span class="col" style="color:red">|</span>
            <div class="col"><i class="bi bi-envelope-fill" style="color:red"></i>helloquantumstore.com</div>
        </div>
        <div class="socials text-center">
            <a href=""><i class="bi bi-facebook"></i></a>
            <a href=""><i class="bi bi-twitter-x text-dark"></i></a>
            <a href=""><i class="bi bi-linkedin"></i></i></a>
            <button title="Print" id="print-btn"><i class="bi bi-printer-fill"></i></button>
        </div>

    </div>

    <!-- Bootstrap JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="receipt.js"></script>
</body>

</html>
